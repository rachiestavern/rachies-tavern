<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rachies Tavern 💗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(to bottom,#fff6f9,#ffeef3);
color:#333;
}

header{
text-align:center;
padding:40px;
background:#ffd6e0;
}

section{
max-width:900px;
margin:auto;
padding:24px;
}

.card{
background:white;
border-radius:18px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.menu-grid{
display:grid;
gap:14px;
}

.item{
background:white;
padding:16px;
border-radius:16px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 6px 16px rgba(0,0,0,0.06);
}

.item-left{
display:flex;
flex-direction:column;
}

.item-name{
font-weight:700;
}

.item-desc{
font-size:0.9rem;
opacity:0.7;
}

.btn{
background:#ff8fab;
color:white;
padding:10px 16px;
border-radius:999px;
border:none;
cursor:pointer;
}

.btn:hover{
background:#ff6f91;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-weight:bold;
font-size:18px;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

.payment-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.payment-card{
background:#fff8fb;
padding:16px;
border-radius:14px;
border:1px solid #f2dbe2;
}

.payment-card img{
max-width:220px;
width:100%;
display:block;
margin-top:10px;
background:white;
border-radius:12px;
}

.result-box{
margin-top:16px;
padding:12px;
background:#fff8fb;
border-radius:12px;
display:none;
}

.loyalty{
color:#ff6f91;
font-weight:bold;
}

.admin-link{
font-size:0.9rem;
margin-top:10px;
display:inline-block;
}

@media(max-width:700px){
.payment-grid{grid-template-columns:1fr}
}

</style>
</head>

<body>

<header>
<h1>Rachies Tavern 💗</h1>
<p>Cozy Home Café in Tampines</p>
</header>

<section>

<div class="card">
<h2>🍰 Menu</h2>
<div id="menu" class="menu-grid"></div>
</div>

<div class="card">
<h2>🛒 Cart</h2>
<div id="cart"></div>
<div class="total">Total: $<span id="total">0.00</span></div>
</div>

<div class="card">

<h2>💳 Checkout</h2>

<input id="name" placeholder="Your name">
<input id="phone" placeholder="Phone number">

<select id="pickup">
<option value="7.30am-9.30am">7.30am-9.30am</option>
<option value="10am-12pm">10am-12pm</option>
<option value="1pm-3pm">1pm-3pm</option>
</select>

<select id="payment">
<option value="paynow (prefered)">PayNow</option>
<option value="cash">Cash</option>
</select>

<textarea id="notes" placeholder="Special requests"></textarea>

<div class="payment-grid">

<div class="payment-card">

<h3>PayNow</h3>

<p><b>Total to Pay:</b> $<span id="paynowTotal">0.00</span></p>

<p>Scan QR and send exact amount</p>

<p><b>Reference:</b> RT + phone number</p>

<img src="paynow.png"
alt="PayNow QR"
onerror="this.style.display='none';document.getElementById('qrError').style.display='block';">

<p id="qrError" style="display:none;font-size:13px;">
QR missing — upload file named <b>paynow.png</b>
</p>

</div>

<div class="payment-card">
<h3>Cash</h3>
<p>Pay during pickup</p>
</div>

</div>

<br>

<button class="btn" onclick="checkout()">Place Order 💗</button>
<button class="btn" onclick="clearCart()">Clear Cart</button>

<div id="orderResult" class="result-box"></div>

</div>

<div class="card">
<h2>🎁 Loyalty</h2>
<p class="loyalty" id="points">Points: 0</p>
<a class="admin-link" href="admin.html">Admin Menu Editor</a>
</div>

</section>

<script>

let cart=[]
let menuItems=[]

async function loadMenu(){

try{
let res=await fetch("menu.json")
menuItems=await res.json()
renderMenu()
}
catch{
document.getElementById("menu").innerHTML="Menu failed to load"
}

}

function renderMenu(){

let menu=document.getElementById("menu")
menu.innerHTML=""

menuItems.forEach(item=>{

let div=document.createElement("div")
div.className="item"

div.innerHTML=`
<div class="item-left">
<div class="item-name">${item.name} — $${item.price}</div>
<div class="item-desc">${item.description||""}</div>
</div>

<button class="btn">Add</button>
`

div.querySelector("button").onclick=()=>addItem(item.name,item.price)

menu.appendChild(div)

})

}

function addItem(name,price){
cart.push({name,price})
updateCart()
}

function removeItem(i){
cart.splice(i,1)
updateCart()
}

function clearCart(){
cart=[]
updateCart()
}

function updateCart(){

let cartDiv=document.getElementById("cart")
cartDiv.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price

cartDiv.innerHTML+=`
<div class="cart-item">
<span>${item.name}</span>
<span>$${item.price.toFixed(2)}</span>
<button onclick="removeItem(${i})">x</button>
</div>
`

})

document.getElementById("total").innerText=total.toFixed(2)
document.getElementById("paynowTotal").innerText=total.toFixed(2)

}

function getPoints(){
return parseInt(localStorage.getItem("points"))||0
}

function setPoints(p){
localStorage.setItem("points",p)
document.getElementById("points").innerText="Points: "+p
}

function checkout(){

if(cart.length===0){
alert("Cart empty")
return
}

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let pickup=document.getElementById("pickup").value
let payment=document.getElementById("payment").value
let notes=document.getElementById("notes").value

let total=0
let summary="Order:\n"

cart.forEach(i=>{
total+=i.price
summary+=`${i.name} - $${i.price}\n`
})

summary+=`Total: $${total}`

let ref=payment==="paynow (prefered)"?`RT${phone}`:"CASH"

const FORM="https://docs.google.com/forms/d/e/1FAIpQLSdJ7NF4Cev78xOBEHL7rhaOPkRBYCNvkm-dQFEAZ3IKG2v70g/viewform"

const params=new URLSearchParams()

params.set("entry.751012397",name)
params.set("entry.248092",phone)
params.set("entry.1759009007",pickup)
params.set("entry.196167867",payment)
params.set("entry.1239336315",ref)

window.open(`${FORM}?usp=pp_url&${params.toString()}`)

let points=getPoints()
points+=cart.length
setPoints(points)

cart=[]
updateCart()

}

setPoints(getPoints())
updateCart()
loadMenu()

</script>

</body>
</html>
