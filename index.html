<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rachies Tavern 💗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

body{
font-family:Segoe UI, sans-serif;
margin:0;
background:linear-gradient(to bottom,#fff6f9,#ffeef3);
color:#333;
}

header{
text-align:center;
padding:40px;
background:#ffd6e0;
}

section{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
}

.item{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
display:flex;
flex-direction:column;
}

.item img{
width:100%;
height:180px;
object-fit:cover;
}

.item-content{
padding:14px;
display:flex;
flex-direction:column;
gap:6px;
}

.item-name{
font-weight:bold;
}

.item-price{
color:#c93f67;
font-weight:bold;
}

.btn{
background:#ff8fab;
color:white;
border:none;
border-radius:20px;
padding:8px 14px;
cursor:pointer;
}

.btn:hover{
background:#ff6f91;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:8px;
}

.payment-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.payment-card{
background:#fff8fb;
border:1px solid #f3dbe4;
padding:14px;
border-radius:12px;
}

.payment-card img{
max-width:220px;
width:100%;
margin-top:10px;
}

@media(max-width:700px){
.payment-grid{grid-template-columns:1fr}
}

</style>
</head>

<body>

<header>
<h1>Rachies Tavern 💗</h1>
<p>Cozy Home Café in Tampines</p>
</header>

<section>

<div class="card">
<h2>Menu</h2>
<div id="menu"></div>
</div>

<div class="card">
<h2>Your Cart</h2>
<div id="cart"></div>
<div class="total">Total: $<span id="total">0.00</span></div>
</div>

<div class="card">

<h2>Checkout</h2>

<input id="name" placeholder="Your name">
<input id="phone" placeholder="Phone number">

<select id="pickup">
<option value="7.30am-9.30am">7.30am-9.30am</option>
<option value="10am-12pm">10am-12pm</option>
<option value="1pm-3pm">1pm-3pm</option>
</select>

<select id="payment">
<option value="paynow (prefered)">PayNow</option>
<option value="cash">Cash</option>
</select>

<textarea id="notes" placeholder="Special requests"></textarea>

<div class="payment-grid">

<div class="payment-card">

<h3>PayNow</h3>

<p>Total to Pay: <b>$<span id="paynowTotal">0.00</span></b></p>

<p>Scan the QR and transfer the exact amount.</p>

<p><b>Reference:</b> RT + phone number</p>

<img src="paynow.png"
onerror="this.style.display='none';document.getElementById('qrerror').style.display='block';">

<p id="qrerror" style="display:none">Upload a file named <b>paynow.png</b></p>

</div>

<div class="payment-card">
<h3>Cash</h3>
<p>Pay during pickup</p>
</div>

</div>

<br>

<button class="btn" onclick="checkout()">Place Order</button>
<button class="btn" onclick="clearCart()">Clear Cart</button>

</div>

<div class="card">
<h3>Loyalty Points</h3>
<p id="points">Points: 0</p>
<a href="admin.html">Admin Menu Editor</a>
</div>

</section>

<script>

let cart=[]
let menu=[]

async function loadMenu(){
let r=await fetch("menu.json")
menu=await r.json()
renderMenu()
}

function renderMenu(){

let menuDiv=document.getElementById("menu")
menuDiv.innerHTML=""

menu.forEach(cat=>{

let h=document.createElement("h3")
h.innerText=cat.category
menuDiv.appendChild(h)

let grid=document.createElement("div")
grid.className="menu-grid"

cat.items.forEach(item=>{

let div=document.createElement("div")
div.className="item"

div.innerHTML=`

${item.image?`<img src="${item.image}">`:''}

<div class="item-content">

<div class="item-name">${item.name}</div>

<div class="item-price">$${item.price}</div>

<div>${item.description||""}</div>

<button class="btn">Add</button>

</div>
`

div.querySelector("button").onclick=()=>addItem(item.name,item.price)

grid.appendChild(div)

})

menuDiv.appendChild(grid)

})

}

function addItem(name,price){
cart.push({name,price})
updateCart()
}

function removeItem(i){
cart.splice(i,1)
updateCart()
}

function clearCart(){
cart=[]
updateCart()
}

function updateCart(){

let div=document.getElementById("cart")
div.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price

div.innerHTML+=`
<div class="cart-item">
${item.name}
<span>$${item.price}</span>
<button onclick="removeItem(${i})">x</button>
</div>
`

})

document.getElementById("total").innerText=total.toFixed(2)
document.getElementById("paynowTotal").innerText=total.toFixed(2)

}

function getPoints(){
return parseInt(localStorage.getItem("points"))||0
}

function setPoints(p){
localStorage.setItem("points",p)
document.getElementById("points").innerText="Points: "+p
}

function checkout(){

if(cart.length==0){alert("Cart empty");return}

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let pickup=document.getElementById("pickup").value
let payment=document.getElementById("payment").value

let ref=payment==="paynow (prefered)"?`RT${phone}`:"CASH"

const FORM="https://docs.google.com/forms/d/e/1FAIpQLSdJ7NF4Cev78xOBEHL7rhaOPkRBYCNvkm-dQFEAZ3IKG2v70g/viewform"

let params=new URLSearchParams()

params.set("entry.751012397",name)
params.set("entry.248092",phone)
params.set("entry.1759009007",pickup)
params.set("entry.196167867",payment)
params.set("entry.1239336315",ref)

window.open(`${FORM}?usp=pp_url&${params.toString()}`)

let points=getPoints()+cart.length
setPoints(points)

cart=[]
updateCart()

}

setPoints(getPoints())
updateCart()
loadMenu()

</script>

</body>
</html>
