<!DOCTYPE html>
<html>
<head>
<title>Rachies Tavern Menu Editor 💗</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
body{
  font-family:Segoe UI,sans-serif;
  max-width:1000px;
  margin:0 auto;
  padding:24px;
  background:#fff6f9;
  color:#333;
}
textarea{
  width:100%;
  height:520px;
  padding:14px;
  border-radius:14px;
  border:1px solid #ead3db;
  font-family:monospace;
  font-size:14px;
}
button{
  background:#ff8fab;
  color:white;
  border:none;
  border-radius:999px;
  padding:10px 16px;
  cursor:pointer;
  margin-top:12px;
}
</style>
</head>

<body>
<h2>Rachies Tavern Menu Editor 💗</h2>
<p>Edit the JSON below, then download the updated file and upload it back to GitHub as <b>menu.json</b>.</p>

<textarea id="menu"></textarea>
<br>
<button onclick="download()">Download menu.json</button>

<script>
fetch("menu.json")
.then(r => r.text())
.then(t => document.getElementById("menu").value = t);

function download(){
  let blob = new Blob([document.getElementById("menu").value], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "menu.json";
  a.click();
}
</script>
</body>
</html>
